<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A5CFF"/>
      <stop offset="100%" stop-color="#5530E5"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34E6D3"/>
      <stop offset="100%" stop-color="#0EB5A4"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A18CFF"/>
      <stop offset="100%" stop-color="#34E6D3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <circle cx="400" cy="400" r="200" fill="url(#grad1)" filter="blur(100px)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite" />
    <animate attributeName="r" values="180;240;180" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="400" r="150" fill="url(#grad2)" filter="blur(80px)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Orbiting track -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" stroke-dasharray="10 15"/>
  <circle cx="400" cy="400" r="220" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" stroke-dasharray="5 10"/>

  <!-- Orbiting nodes -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 400" to="360 400 400" dur="30s" repeatCount="indefinite"/>
    <!-- Python Dot -->
    <circle cx="400" cy="100" r="12" fill="#34E6D3" filter="url(#glow)"/>
    <!-- React/Web Dot -->
    <circle cx="400" cy="700" r="16" fill="#7A5CFF" filter="url(#glow)"/>
    <!-- Rust/Core Dot -->
    <circle cx="100" cy="400" r="10" fill="#A18CFF" filter="url(#glow)"/>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 400 400" to="0 400 400" dur="45s" repeatCount="indefinite"/>
    <circle cx="620" cy="400" r="8" fill="#34E6D3" filter="url(#glow)"/>
  </g>

  <!-- Center Logo Scale Pulse -->
  <g transform="translate(400, 400)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.95;1.05;0.95" dur="4s" repeatCount="indefinite"/>
      <!-- Inner mark, exact coordinates centered on 0,0 -->
      <g transform="translate(-140, -140) scale(0.55)">
        <g transform="rotate(-25, 256, 256)">
          <rect x="156" y="76" width="88" height="360" rx="44" fill="url(#grad1)" filter="url(#shadow)"/>
          <rect x="196" y="76" width="220" height="88" rx="44" fill="url(#grad2)" filter="url(#shadow)"/>
          <rect x="196" y="212" width="168" height="88" rx="44" fill="url(#grad3)" filter="url(#shadow)"/>
        </g>
      </g>
    </g>
  </g>
</svg>
