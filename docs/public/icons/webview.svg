<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5530E5"/><stop offset="100%" stop-color="#34E6D3"/></linearGradient>
  </defs>
  <rect x="10" y="20" width="80" height="60" rx="6" fill="none" stroke="url(#grad3)" stroke-width="4"/>
  <path d="M10 40 L90 40" stroke="url(#grad3)" stroke-width="4"/>
  <circle cx="20" cy="30" r="3" fill="#A18CFF"/>
  <circle cx="32" cy="30" r="3" fill="#34E6D3"/>
  <!-- Animated loading line inside -->
  <rect x="20" y="55" width="20" height="4" rx="2" fill="#34E6D3">
    <animate attributeName="width" values="20;50;20" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="20" y="65" width="40" height="4" rx="2" fill="#7A5CFF" opacity="0.6"/>
</svg>
