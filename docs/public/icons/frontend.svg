<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7A5CFF"/><stop offset="100%" stop-color="#34E6D3"/></linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    <ellipse rx="40" ry="12" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.8"/>
    <ellipse rx="40" ry="12" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.8" transform="rotate(60)"/>
    <ellipse rx="40" ry="12" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.8" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="8" fill="#34E6D3"/>
  </g>
</svg>
