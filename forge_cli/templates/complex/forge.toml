[app]
name = "{{PROJECT_NAME}}"
version = "0.1.0"
description = "A complex structured Forge application."
authors = ["{{AUTHOR}}"]

[window]
title = "{{PROJECT_NAME}}"
width = {{WINDOW_WIDTH}}
height = {{WINDOW_HEIGHT}}
resizable = true

[build]
backend = "main:app"
frontend_dir = "src/frontend"

[dev]
frontend_dir = "src/frontend"
hot_reload = true
port = 5173

[tool.forge_template]
name = "complex"
schema_version = 1
forge_version_range = ">=3.0.0,<4.0.0"
