<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Forge Hello Icon - Lightning Bolt -->
  <defs>
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#bd00ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="#0a0a0f"/>
  
  <!-- Lightning Bolt -->
  <path d="M140 40 L80 140 L120 140 L100 220 L180 120 L135 120 Z" 
        fill="url(#boltGradient)" 
        stroke="#00f0ff" 
        stroke-width="2"/>
  
  <!-- Glow Effect -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="rgba(0, 240, 255, 0.1)" stroke-width="2"/>
  
  <!-- Python Logo Hint (small circle) -->
  <circle cx="180" cy="70" r="15" fill="#3776ab" opacity="0.8"/>
  <circle cx="190" cy="65" r="5" fill="#ffd343"/>
</svg>
