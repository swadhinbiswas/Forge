[app]
name = "Hello Forge"
version = "1.0.0"
description = "A minimal demo app to validate Forge IPC"
authors = ["Forge Team"]
main_html = "src/frontend/index.html"

[window]
title = "Hello Forge"
width = 1024
height = 768
resizable = true
fullscreen = false
min_width = 400
min_height = 300
decorations = true
always_on_top = false
transparent = false

[build]
entry = "src/main.py"
icon = "assets/icon.png"
output_dir = "dist"
single_binary = true

[dev]
frontend_dir = "src/frontend"
hot_reload = true
port = 5173

[permissions]
filesystem = true
clipboard = true
dialogs = true
system_tray = false
