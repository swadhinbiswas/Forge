<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A5CFF"/>
      <stop offset="100%" stop-color="#5530E5"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34E6D3"/>
      <stop offset="100%" stop-color="#0EB5A4"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A18CFF"/>
      <stop offset="100%" stop-color="#34E6D3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <g transform="rotate(-25, 256, 256)">
    <!-- Vertical Stem -->
    <rect x="156" y="76" width="88" height="360" rx="44" fill="url(#grad1)" filter="url(#shadow)"/>
    <!-- Top Branch -->
    <rect x="196" y="76" width="220" height="88" rx="44" fill="url(#grad2)" filter="url(#shadow)"/>
    <!-- Middle Branch -->
    <rect x="196" y="212" width="168" height="88" rx="44" fill="url(#grad3)" filter="url(#shadow)"/>
  </g>
</svg>
