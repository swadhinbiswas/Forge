<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Forge API Explorer Icon - Terminal/Code -->
  <defs>
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#0a0a0f" rx="20"/>
  
  <!-- Terminal Window -->
  <rect x="40" y="60" width="176" height="140" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="2"/>
  
  <!-- Terminal Header -->
  <rect x="40" y="60" width="176" height="24" rx="8" fill="#252537"/>
  <circle cx="56" cy="72" r="4" fill="#f38ba8"/>
  <circle cx="70" cy="72" r="4" fill="#f9e2af"/>
  <circle cx="84" cy="72" r="4" fill="#a6e3a1"/>
  
  <!-- Code/Command Prompt -->
  <text x="60" y="110" fill="#89b4fa" font-family="monospace" font-size="16">&gt; forge.api</text>
  <text x="60" y="135" fill="#a6e3a1" font-family="monospace" font-size="14">✓ connected</text>
  <text x="60" y="160" fill="#cba6f7" font-family="monospace" font-size="14">⚡ invoke()</text>
  
  <!-- Decorative Code Brackets -->
  <path d="M180 120 L200 135 L180 150" fill="none" stroke="url(#apiGradient)" stroke-width="3"/>
  
  <!-- Glow -->
  <ellipse cx="128" cy="130" rx="60" ry="30" fill="rgba(137, 180, 250, 0.1)"/>
</svg>
