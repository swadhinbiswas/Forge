[app]
name = "forge_chat"
version = "1.0.0"
description = "A Forge desktop application with React"
authors = ["swadhinswadhin"]

[window]
title = "forge_chat"
width = 1280
height = 800
resizable = true
fullscreen = false
min_width = 400
min_height = 300
decorations = true
always_on_top = false
transparent = false

[build]
entry = "src/main.py"
icon = "assets/icon.png"
output_dir = "dist"
single_binary = true

[dev]
frontend_dir = "src/frontend"
hot_reload = true
port = 5173
dev_server_command = "npm run dev"
dev_server_url = "http://127.0.0.1:5173"

[permissions]
filesystem = true
clipboard = true
dialogs = true
system_tray = true
websocket = true
window_state = true
lifecycle = true
os_integration = true

[tool.forge_template]
name = "react"
schema_version = 1
forge_version_range = ">=2.0.0,<3.0.0"
