<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📝</span>
                    <h1>Forge Notes</h1>
                </div>
                <button class="icon-btn" onclick="refreshNotes()" title="Refresh">
                    🔄
                </button>
            </div>

            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search notes..."
                    onkeyup="handleSearch(event)"
                >
                <button class="search-btn" onclick="searchNotes()">🔍</button>
            </div>

            <div class="sidebar-actions">
                <button class="primary-btn" onclick="createNewNote()">
                    <span>+</span> New Note
                </button>
                <button class="secondary-btn" onclick="openNoteDialog()">
                    📁 Open File
                </button>
            </div>

            <div class="notes-list" id="notesList">
                <!-- Notes will be populated here -->
            </div>

            <div class="sidebar-footer">
                <div class="stats">
                    <span id="noteCount">0 notes</span>
                    <span id="totalSize">0 KB</span>
                </div>
            </div>
        </aside>

        <!-- Main editor -->
        <main class="editor">
            <div class="editor-header">
                <div class="title-section">
                    <input 
                        type="text" 
                        id="noteTitle" 
                        placeholder="Untitled Note" 
                        class="title-input"
                        onchange="onTitleChange()"
                    >
                    <span id="unsavedIndicator" class="unsaved-indicator" title="Unsaved changes">●</span>
                </div>
                <div class="editor-actions">
                    <button onclick="saveCurrentNote()" title="Save (Ctrl+S)">
                        💾 Save
                    </button>
                    <button onclick="saveNoteDialog()" title="Save As">
                        📁 Save As
                    </button>
                    <button onclick="deleteCurrentNote()" class="danger" title="Delete">
                        🗑️ Delete
                    </button>
                </div>
            </div>

            <textarea 
                id="noteEditor" 
                placeholder="Start writing your note...

Tips:
• Press Ctrl+S to save quickly
• Notes are stored in the ./notes directory
• Use the search box to find notes by content"
                spellcheck="false"
                oninput="onContentChange()"
            ></textarea>

            <div class="editor-footer">
                <div class="footer-left">
                    <span id="lastSaved" class="last-saved">Not saved yet</span>
                </div>
                <div class="footer-right">
                    <span id="charCount">0 characters</span>
                    <span id="wordCount">0 words</span>
                    <span id="lineCount">0 lines</span>
                </div>
            </div>
        </main>

        <!-- Empty state overlay -->
        <div id="emptyState" class="empty-state">
            <div class="empty-state-content">
                <div class="empty-state-icon">📝</div>
                <h2>No Note Selected</h2>
                <p>Select a note from the sidebar or create a new one</p>
                <button class="primary-btn" onclick="createNewNote()">
                    <span>+</span> Create New Note
                </button>
            </div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast"></div>

    <script src="main.js"></script>
</body>
</html>
