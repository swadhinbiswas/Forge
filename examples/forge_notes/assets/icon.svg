<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Forge Notes Icon - Notepad -->
  <defs>
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#0a0a0f" rx="20"/>
  
  <!-- Notepad Base -->
  <rect x="60" y="50" width="136" height="160" rx="8" fill="#1a1a25" stroke="#2a2a3a" stroke-width="2"/>
  
  <!-- Notepad Lines -->
  <line x1="80" y1="90" x2="176" y2="90" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="120" x2="176" y2="120" stroke="#4a4a5a" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="150" x2="176" y2="150" stroke="#4a4a5a" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="180" x2="140" y2="180" stroke="#4a4a5a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Pen/Pencil Icon -->
  <path d="M160 160 L200 120 L220 140 L180 180 Z" fill="url(#noteGradient)"/>
  <circle cx="210" cy="130" r="8" fill="#f5c2e7"/>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="70" r="4" fill="#6366f1"/>
  <circle cx="100" cy="70" r="4" fill="#a855f7"/>
  <circle cx="120" cy="70" r="4" fill="#6366f1"/>
</svg>
