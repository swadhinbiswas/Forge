<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F111A"/>
      <stop offset="100%" stop-color="#1A1829"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A5CFF"/>
      <stop offset="100%" stop-color="#5530E5"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34E6D3"/>
      <stop offset="100%" stop-color="#0EB5A4"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A18CFF"/>
      <stop offset="100%" stop-color="#34E6D3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Subtle Background Pattern / Watermark -->
  <g transform="translate(800, -100) scale(1.5) rotate(15)" opacity="0.05">
    <rect x="156" y="76" width="88" height="360" rx="44" fill="#FFF"/>
    <rect x="196" y="76" width="220" height="88" rx="44" fill="#FFF"/>
    <rect x="196" y="212" width="168" height="88" rx="44" fill="#FFF"/>
  </g>

  <!-- Center Logo and Text -->
  <g transform="translate(420, 200)">
    <!-- Logo Mark -->
    <g transform="translate(-140, -40) scale(0.6)">
      <g transform="rotate(-25, 256, 256)">
        <rect x="156" y="76" width="88" height="360" rx="44" fill="url(#grad1)" filter="url(#shadow)"/>
        <rect x="196" y="76" width="220" height="88" rx="44" fill="url(#grad2)" filter="url(#shadow)"/>
        <rect x="196" y="212" width="168" height="88" rx="44" fill="url(#grad3)" filter="url(#shadow)"/>
      </g>
    </g>
    
    <!-- Text -->
    <text x="220" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="120" font-weight="800" fill="#FFFFFF" letter-spacing="-3">
      Forge<tspan fill="#7A5CFF">Desk</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="640" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="500" fill="#9CA3AF" text-anchor="middle" letter-spacing="0">
    Ship fast, secure, native desktop apps with Python.
  </text>
  
  <!-- Tech Stack Pills -->
  <g transform="translate(640, 520)">
    <!-- Python -->
    <rect x="-160" y="-24" width="100" height="48" rx="24" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    <text x="-110" y="6" font-family="sans-serif" font-size="18" font-weight="600" fill="#34E6D3" text-anchor="middle">Python</text>
    
    <!-- React -->
    <rect x="-40" y="-24" width="90" height="48" rx="24" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    <text x="5" y="6" font-family="sans-serif" font-size="18" font-weight="600" fill="#34E6D3" text-anchor="middle">React</text>
    
    <!-- Native -->
    <rect x="70" y="-24" width="100" height="48" rx="24" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    <text x="120" y="6" font-family="sans-serif" font-size="18" font-weight="600" fill="#7A5CFF" text-anchor="middle">Native</text>
  </g>
</svg>
