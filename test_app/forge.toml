[app]
name = "test_app"
version = "1.0.0"
description = "A Forge desktop application with Next.js"
authors = ["swadhin"]

[window]
title = "test_app"
width = 1280
height = 800
resizable = true
fullscreen = false
min_width = 400
min_height = 300
decorations = true
always_on_top = false
transparent = false

[build]
entry = "src/main.py"
icon = "assets/icon.png"
output_dir = "dist"
single_binary = true

[dev]
frontend_dir = "src/frontend"
hot_reload = true
port = 3000

[permissions]
filesystem = true
clipboard = true
dialogs = true
system_tray = false

[tool.forge_template]
name = "nextjs"
schema_version = 1
forge_version_range = ">=2.0.0,<3.0.0"
